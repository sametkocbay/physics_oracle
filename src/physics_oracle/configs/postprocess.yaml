# Post-processing configuration — source of truth for ML dataset export,
# quality control, and the visualization tool.

ml_dataset:
  # Crop box in chord-normalized coordinates (LE at x=0, TE at x=1).
  bounding_box:
    x: [-1.5, 3.5]
    y: [-1.5, 1.5]

  output_format: npz          # npz | h5
  dtype: float32              # float32 | float64
  crop: true

  metadata_csv:
    columns:
      - file_name
      - case_id
      - naca_code
      - aoa_deg
      - reynolds
      - u_inlet_x
      - u_inlet_y
      - u_mag
      - cl
      - cd

visualize:
  wall_sdf_threshold: 0.005
  resolution: 600             # grid width in pixels (height auto-scales)
  dpi: 150
  panels:                     # 2x2 panel layout
    - { key: u,   title: "$u$ (velocity x)",    cmap: RdBu_r,   diverging: true }
    - { key: v,   title: "$v$ (velocity y)",    cmap: RdBu_r,   diverging: true }
    - { key: p,   title: "$p$ (pressure)",      cmap: coolwarm, diverging: true }
    - { key: sdf, title: "SDF (wall distance)", cmap: viridis,  diverging: false }

qc:
  orders_drop_min: 4.0        # full residual acceptance: all fields >= this drop
  orders_drop_hard_min: 3.5   # below this: always reject (empirically, cases
                              # under ~3.7 orders are genuinely unsteady flows)
  orders_drop_ref_window: 10  # reference residual = max over the first N iters
                              # (robust to a good initial guess lowering iter-1)
  orders_drop_tail_window: 50 # final residual = median over the last N iters
                              # (robust to the phase of a mild limit cycle;
                              # identical to the endpoint for converged runs)
  # Gray zone [hard_min, orders_drop_min): accept only if the physical
  # observables prove stationarity — trailing-window Cl AND Cd relative
  # scatter and half-window drift below these bounds.  Rescues force-steady
  # cases whose p residual norm converges slowly at high Re (e.g. thick
  # sections at Re 2e6) without admitting unsteady flows.
  force_tail_window: 500      # trailing iterations for the stationarity check
  force_std_rel_max: 0.02     # std/|mean| bound for Cl and Cd
  force_drift_rel_max: 0.02   # |mean(2nd half) - mean(1st half)|/|mean| bound
  y_plus_max: 5.0             # reject if max y+ exceeds this
  iter_limit: 5000            # flag if solver hits this iteration count
