# OpenFOAM dataset configuration — source of truth for solver setup.
#
# Per-case values are substituted at render time by
# src/openfoam_setup/case_setup.py before the structure is fed to
# src/openfoam_setup/of_writer.py.  Sentinel strings (uppercase keys
# under `placeholders:` below) document which values are case-dependent.

placeholders:
  # Replaced per-case in case_setup.py:
  #   U_X, U_Y         — inlet velocity components
  #   U_MAG            — inlet velocity magnitude
  #   K                — inlet turbulent kinetic energy
  #   OMEGA            — inlet specific dissipation
  #   LIFT_X, LIFT_Y   — lift unit vector (depends on AoA)
  #   DRAG_X, DRAG_Y   — drag unit vector (depends on AoA)
  #   END_TIME         — simpleFOAM end-time / max iterations
  #   WRITE_INTERVAL   — controlDict writeInterval
  #   NU               — kinematic viscosity (physical.nu)

physical:
  nu: 1.0e-5
  chord: 1.0

turbulence:
  intensity: 0.01            # I, §5.3 k formula
  length_fraction: 0.07      # L = frac * chord, §5.3 omega formula
  c_mu: 0.09                 # k-omega SST closure constant
  model: kOmegaSST

momentum_transport:
  simulationType: RAS
  RAS:
    model: kOmegaSST
    turbulence: 'on'
    printCoeffs: 'on'

control_dict:
  application: foamRun
  solver: incompressibleFluid
  startFrom: startTime
  startTime: 0
  stopAt: endTime
  endTime: __END_TIME__
  deltaT: 1
  writeControl: timeStep
  writeInterval: __WRITE_INTERVAL__
  purgeWrite: 1
  writeFormat: ascii
  writePrecision: 12
  writeCompression: 'off'
  timeFormat: general
  timePrecision: 6
  runTimeModifiable: 'true'
  functions:
    forceCoeffs1:
      type: forceCoeffs
      libs: ['"libforces.so"']
      writeControl: timeStep
      writeInterval: 1
      patches: [airfoilWalls]
      rho: rhoInf
      rhoInf: 1
      liftDir: "(__LIFT_X__ __LIFT_Y__ 0)"
      dragDir: "(__DRAG_X__ __DRAG_Y__ 0)"
      CofR: "(0.25 0 0)"
      pitchAxis: "(0 0 1)"
      magUInf: __U_MAG__
      lRef: 1.0
      Aref: 0.01          # chord (1.0) x span extrusion (0.01); NOT 1.0, else Cl/Cd come out 100x low
    residuals:
      type: residuals
      libs: ['"libutilityFunctionObjects.so"']
      writeControl: timeStep
      writeInterval: 1
      fields: [U, p, k, omega]
    yPlus:
      type: yPlus
      libs: ['"libfieldFunctionObjects.so"']
      writeControl: writeTime
      patches: [airfoilWalls]
    wallShearStress:
      type: wallShearStress
      libs: ['"libfieldFunctionObjects.so"']
      writeControl: writeTime
      patches: [airfoilWalls]
    writePhi:
      type: writeObjects
      libs: ['"libutilityFunctionObjects.so"']
      writeControl: writeTime
      writeOption: anyWrite
      objects: [phi]

fv_schemes:
  ddtSchemes:
    default: steadyState
  gradSchemes:
    default: Gauss linear
    grad(U): cellLimited Gauss linear 1
    grad(p): Gauss linear
  divSchemes:
    default: none
    div(phi,U): bounded Gauss linearUpwindV grad(U)
    div(phi,k): bounded Gauss upwind
    div(phi,omega): bounded Gauss upwind
    div((nuEff*dev2(T(grad(U))))): Gauss linear
    div((nuEff*dev(T(grad(U))))): Gauss linear
    div(div(phi,U)): Gauss linear   # required by potentialFoam -writep
  # The C-mesh has a handful of near-degenerate faces at the sharp-TE/wake
  # cut (max non-orthogonality ~89-90 deg on every mesh, in-band included).
  # `limited corrected 0.5` bounds the explicit non-orthogonal correction to
  # the implicit part; it is identical to `corrected` on faces below ~63 deg
  # and prevents the correction from diverging on the degenerate ones (the
  # unlimited form made potentialFoam's corrector loop and the high-Re p
  # solves blow up).
  laplacianSchemes:
    default: Gauss linear limited corrected 0.5
  interpolationSchemes:
    default: linear
  snGradSchemes:
    default: limited corrected 0.5
  fluxRequired:
    default: 'no'
    p: ~
    phi: ~
    Phi: ~          # required by the potentialFoam initialisation step
  wallDist:
    method: meshWave

fv_solution:
  solvers:
    p:
      solver: GAMG
      tolerance: 1.0e-7
      relTol: 0.01
      smoother: DICGaussSeidel
      cacheAgglomeration: 'true'
      agglomerator: faceAreaPair
      nCellsInCoarsestLevel: 10
      mergeLevels: 1
    '"(U|k|omega)"':
      solver: smoothSolver
      smoother: symGaussSeidel
      tolerance: 1.0e-8
      relTol: 0.1
    # Velocity potential solved by the potentialFoam pre-step (cold-start init).
    Phi:
      solver: GAMG
      smoother: DIC
      tolerance: 1.0e-6
      relTol: 0.01
      cacheAgglomeration: 'true'
      agglomerator: faceAreaPair
      nCellsInCoarsestLevel: 10
      mergeLevels: 1
  # Used only by the potentialFoam initialisation step.
  potentialFlow:
    nNonOrthogonalCorrectors: 10
  SIMPLE:
    nNonOrthogonalCorrectors: 2
    consistent: 'yes'
    # 1e-6 so an early exit implies >= 4-5 orders of residual drop from any
    # plausible starting level (the QC criterion is a relative drop; the old
    # 1e-4/1e-5 could stop a well-initialised run before 4 measured orders).
    residualControl:
      p: 1.0e-6
      U: 1.0e-6
      '"(k|omega)"': 1.0e-6
  relaxationFactors:
    fields:
      p: 0.3
    equations:
      # Softened from 0.7 for robustness at high AoA / high Re, where an
      # aggressive momentum relaxation lets the first iterations overshoot.
      U: 0.5
      '"(k|omega)"': 0.5
  cache:
    grad(U): ~

# Two-stage startup continuation for cases outside the trained envelope
# (|AoA| > gate.aoa_abs_deg_over  or  Re > gate.re_over).  Stage A runs
# first-order momentum with heavy under-relaxation and field limiting to
# survive the cold-start transient; stage B restarts from the stage-A field
# with the production schemes above and runs to full convergence.  In-band
# cases never enter this path, so their behavior is unchanged.
# See runner.run_simple_foam / case_setup.write_stage_system.
startup:
  gate:
    aoa_abs_deg_over: 5.0
    re_over: 5.0e5
  u_limit_factor: 4.0          # stage-A limitMag on U: max = factor * U_mag
  omega_floor_factor: 1.0e-3   # stage-A bound on omega: min = factor * omega_inlet
  stage_a:
    iterations: 400
    fv_schemes:
      divSchemes:
        div(phi,U): bounded Gauss upwind
    fv_solution:
      relaxationFactors:
        fields:
          p: 0.2
        equations:
          U: 0.3
          '"(k|omega)"': 0.3
      SIMPLE:
        nNonOrthogonalCorrectors: 3
        residualControl: {}    # never exit stage A early
    fv_constraints:
      limitU:
        type: limitMag
        cellZone: all
        field: U
        max: __U_LIM__
      boundOmega:
        type: bound
        field: omega
        min: __OMEGA_MIN__
  # Stage-B overrides (gated cases only): slightly heavier under-relaxation
  # damps the mild p limit cycle that marginal OOD cases (thin sections /
  # high camber near the envelope edge) otherwise settle into at ~1e-4.
  stage_b:
    fv_solution:
      relaxationFactors:
        fields:
          p: 0.2
        equations:
          U: 0.4
          '"(k|omega)"': 0.4

# Boundary conditions, per field, per patch.  case_setup.py substitutes the
# __U_X__/__U_Y__/__K__/__OMEGA__ sentinels with per-case numerics before
# rendering.  __inline_children__ tells the OF writer to render each child
# dict as a single line inside the parent block.
boundary_conditions:
  U:
    dimensions: '[0 1 -1 0 0 0 0]'
    internalField: "uniform (__U_X__ __U_Y__ 0)"
    boundaryField:
      __inline_children__: true
      inlet:
        type: fixedValue
        value: "uniform (__U_X__ __U_Y__ 0)"
      outlet:
        type: zeroGradient
      top:
        type: freestream
        freestreamValue: "uniform (__U_X__ __U_Y__ 0)"
      bottom:
        type: freestream
        freestreamValue: "uniform (__U_X__ __U_Y__ 0)"
      airfoilWalls:
        type: noSlip
      frontAndBack:
        type: empty

  p:
    dimensions: '[0 2 -2 0 0 0 0]'
    internalField: "uniform 0"
    boundaryField:
      __inline_children__: true
      inlet:
        type: zeroGradient
      outlet:
        type: fixedValue
        value: "uniform 0"
      top:
        type: freestream
        freestreamValue: "uniform 0"
      bottom:
        type: freestream
        freestreamValue: "uniform 0"
      airfoilWalls:
        type: zeroGradient
      frontAndBack:
        type: empty

  k:
    dimensions: '[0 2 -2 0 0 0 0]'
    internalField: "uniform __K__"
    boundaryField:
      __inline_children__: true
      inlet:
        type: fixedValue
        value: "uniform __K__"
      outlet:
        type: zeroGradient
      top:
        type: inletOutlet
        inletValue: "uniform __K__"
        value: "uniform __K__"
      bottom:
        type: inletOutlet
        inletValue: "uniform __K__"
        value: "uniform __K__"
      airfoilWalls:
        type: fixedValue
        value: "uniform 0"
      frontAndBack:
        type: empty

  omega:
    dimensions: '[0 0 -1 0 0 0 0]'
    internalField: "uniform __OMEGA__"
    boundaryField:
      __inline_children__: true
      inlet:
        type: fixedValue
        value: "uniform __OMEGA__"
      outlet:
        type: zeroGradient
      top:
        type: inletOutlet
        inletValue: "uniform __OMEGA__"
        value: "uniform __OMEGA__"
      bottom:
        type: inletOutlet
        inletValue: "uniform __OMEGA__"
        value: "uniform __OMEGA__"
      airfoilWalls:
        type: omegaWallFunction
        value: "uniform __OMEGA__"
      frontAndBack:
        type: empty

  nut:
    dimensions: '[0 2 -1 0 0 0 0]'
    internalField: "uniform 0"
    boundaryField:
      __inline_children__: true
      inlet:
        type: calculated
        value: "uniform 0"
      outlet:
        type: calculated
        value: "uniform 0"
      top:
        type: calculated
        value: "uniform 0"
      bottom:
        type: calculated
        value: "uniform 0"
      airfoilWalls:
        type: nutLowReWallFunction
        value: "uniform 0"
      frontAndBack:
        type: empty

  phi:
    dimensions: '[0 3 -1 0 0 0 0]'
    internalField: "uniform 0"
    boundaryField:
      __inline_children__: true
      inlet:
        type: calculated
        value: "uniform 0"
      outlet:
        type: calculated
        value: "uniform 0"
      top:
        type: calculated
        value: "uniform 0"
      bottom:
        type: calculated
        value: "uniform 0"
      airfoilWalls:
        type: calculated
        value: "uniform 0"
      frontAndBack:
        type: empty

field_classes:
  U: volVectorField
  p: volScalarField
  k: volScalarField
  omega: volScalarField
  nut: volScalarField
  phi: surfaceScalarField
